[package]
name = "qrlyzer"
license = "MIT"
version = "0.3.1"
edition = "2021"

[lib]
name = "qrlyzer"
crate-type = ["cdylib", "rlib"]

[dependencies]
fast_image_resize = { version = "6.0.0", features = ["image"] }
image = "0.25.10"
imageproc = "0.26.1"
pyo3 = "0.28.3"
rqrr = "0.10.1"
rxing = { version = "0.8.5", default-features = false, features = ["encoding_rs"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
